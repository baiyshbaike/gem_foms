<body>
    <div id="app">

        <div style="position:absolute; top:30vh; width:100%; text-align:center">
            <h1>АИС Гемодиализ</h1>
            <div style="display:flex; gap:10px; justify-content:center; align-items:center">

                Loading...

        An unhandled error has occurred.

    <script src="js/cam.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script>
        window.downloadFileFromStream = async (fileName, contentStreamReference) => {
            const arrayBuffer = await contentStreamReference.arrayBuffer();
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName ?? '';
            anchorElement.click();
            anchorElement.remove();
            URL.revokeObjectURL(url);
        }
       
        function printDiv() {
            var divContents = document.getElementById("dvPrint").innerHTML;
            var a = window.open('', '', 'height=500, width=600');
            a.document.write('<html>');
            a.document.write('<head><title></title>');
            a.document.write('<link href="mudblazor/MudBlazor.min.css" rel="stylesheet" />');
            a.document.write('<style>');
            a.document.write('.mud-typography-h6{font-weight:500;}');
            a.document.write('table, th, td {border-collapse: collapse; border: 1px solid; padding-left:10px; padding-right:10px;}');
            a.document.write('.mud-typography-h6{font-weight:500;}');
            a.document.write('.printHeader{font-weight:500; font-size:16px;}');
            a.document.write('.tbNoBorder{border: 0px !important; padding-left:10px; padding-right:20px; padding-top:10px; padding-bottom:10px;}');            
            a.document.write('</style>');
            a.document.write('</head><body> <br>');
            a.document.write(divContents);
            a.document.write('</body></html>');
            a.document.close();
            a.print();
        }

        function printDivWord(filename) {
            var content = document.getElementById("dvPrint").innerHTML;
            var docx = htmlDocx.asBlob(content);
            var link = document.createElement('a');
            link.href = window.URL.createObjectURL(docx);
            link.download = (filename || "document") + '.docx';
            link.click();
        }

        function getTimeById(){
            let hour = document.getElementById("appt-time").value.split(':')[0];
            let minute = document.getElementById("appt-time").value.split(':')[1];
            return { hour: parseInt(hour), minute: parseInt(minute) };
        }
    </script>
    <script>
        // Auto-reload when a new app version is deployed (service worker updated)
        var isFirstLoad = !navigator.serviceWorker.controller;
        navigator.serviceWorker.register('service-worker.js');
        navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (!isFirstLoad) {
                window.location.reload();
            }
        });
    </script>
    <script>
        window.downloadFileFromStream = async (fileName, fileContent) => {
            const link = document.createElement('a');
            link.href = `data:application/octet-stream;base64,${fileContent}`;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

</body>
