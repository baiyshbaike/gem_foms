services:
  postgres:
    image: postgres:16-alpine
    container_name: dialysis_postgres
    restart: unless-stopped
    ports:
    - "${POSTGRES_PORT}:5432"
    env_file:
      - .env
    volumes:
      - dialysis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: dialysis_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "${API_HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dialysis_postgres_data: